---
- name: Installation of Engine-X
  hosts: dd_web
  become: true
  tasks:
    - name: install nginx
      dnf:
        name: nginx
        state: present

    - name: start nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: update landing page
      copy:
        content: |
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <title>Coucou c'est DANY</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: 'Segoe UI', sans-serif;
                background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
              }
              .card {
                background: rgba(255,255,255,0.05);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 20px;
                padding: 60px 80px;
                text-align: center;
                backdrop-filter: blur(10px);
                box-shadow: 0 25px 50px rgba(0,0,0,0.4);
              }
              h1 {
                color: #e94560;
                font-size: 3rem;
                margin-bottom: 16px;
                letter-spacing: 2px;
              }
              p {
                color: #a8b2d8;
                font-size: 1.1rem;
              }
              .badge {
                display: inline-block;
                margin-top: 30px;
                padding: 8px 20px;
                border-radius: 50px;
                background: #e94560;
                color: white;
                font-size: 0.85rem;
                letter-spacing: 1px;
              }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Coucou c'est DANY</h1>
              <p>Instance EC2 — Amazon Linux 2023</p>
              <span class="badge">Deploye avec Terraform + Ansible</span>
            </div>
          </body>
          </html>
        dest: /usr/share/nginx/html/index.html
